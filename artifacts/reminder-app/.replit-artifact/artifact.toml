kind = "mobile"
previewPath = "/"
title = "Reminder & Task Manager"
version = "1.0.0"
id = "artifacts/reminder-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21127

[services.development]
run = "pnpm --filter @workspace/reminder-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reminder-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/reminder-app", "run", "serve" ]

[services.env]
PORT = "21127"
BASE_PATH = "/"
